<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67D8FF"/>
      <stop offset="0.52" stop-color="#6E7CFF"/>
      <stop offset="1" stop-color="#B06CFF"/>
    </linearGradient>
    <mask id="playMask">
      <rect width="1024" height="1024" fill="white"/>
      <path d="M340 305C340 271 378 250 408 269L738 478C766 495 766 533 738 550L408 759C378 778 340 757 340 723V305Z" fill="black"/>
    </mask>
  </defs>

  <!-- Fondo edge-to-edge sin contorno -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- Play recortado (mask) para que se vea el degradado del fondo -->
  <rect width="1024" height="1024" fill="white" mask="url(#playMask)" opacity="0"/>
  <path d="M340 305C340 271 378 250 408 269L738 478C766 495 766 533 738 550L408 759C378 778 340 757 340 723V305Z" fill="white"/>

  <!-- Swoosh inferior sutil -->
  <path d="M210 820C360 880 660 880 814 800" stroke="white" stroke-opacity="0.6" stroke-width="22" stroke-linecap="round" fill="none"/>

  <!-- QR block esquina -->
  <g transform="translate(700 640)">
    <rect x="0" y="0" width="240" height="240" rx="36" fill="white"/>
    <!-- finder squares -->
    <rect x="20" y="20" width="60" height="60" rx="10" fill="#6E7CFF"/>
    <rect x="32" y="32" width="36" height="36" rx="6" fill="white"/>

    <rect x="160" y="20" width="60" height="60" rx="10" fill="#6E7CFF"/>
    <rect x="172" y="32" width="36" height="36" rx="6" fill="white"/>

    <rect x="20" y="160" width="60" height="60" rx="10" fill="#6E7CFF"/>
    <rect x="32" y="172" width="36" height="36" rx="6" fill="white"/>

    <!-- data modules -->
    <rect x="100" y="30" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="100" y="56" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="126" y="56" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="100" y="100" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="126" y="100" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="152" y="100" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="100" y="126" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="100" y="152" width="18" height="18" rx="3" fill="#6E7CFF"/>
    <rect x="152" y="152" width="18" height="18" rx="3" fill="#6E7CFF"/>
  </g>
</svg>
