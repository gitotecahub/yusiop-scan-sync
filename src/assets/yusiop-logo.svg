<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="gradMain" x1="180" y1="180" x2="844" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67D8FF"/>
      <stop offset="0.52" stop-color="#6E7CFF"/>
      <stop offset="1" stop-color="#B06CFF"/>
    </linearGradient>
    <linearGradient id="gradText" x1="210" y1="770" x2="814" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67D8FF"/>
      <stop offset="1" stop-color="#B06CFF"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="playMask">
      <rect width="1024" height="1024" fill="black"/>
      <rect x="240" y="200" width="544" height="544" rx="128" fill="white"/>
      <path d="M420 345C420 327 440 316 456 326L631 431C647 440 647 464 631 473L456 578C440 588 420 577 420 559V345Z" fill="black"/>
    </mask>
  </defs>

  <!-- Icon -->
  <g filter="url(#softGlow)">
    <rect x="240" y="200" width="544" height="544" rx="128" fill="url(#gradMain)" mask="url(#playMask)"/>
    <!-- subtle lower swoosh -->
    <path d="M314 648C405 694 575 699 672 618" stroke="white" stroke-opacity="0.95" stroke-width="18" stroke-linecap="round"/>

    <!-- QR block -->
    <g transform="translate(560 378)">
      <rect x="0" y="0" width="192" height="192" rx="20" fill="url(#gradMain)" fill-opacity="0.15"/>
      <!-- finder squares -->
      <rect x="0" y="0" width="58" height="58" rx="8" fill="white"/>
      <rect x="12" y="12" width="34" height="34" rx="4" fill="url(#gradMain)"/>

      <rect x="118" y="0" width="58" height="58" rx="8" fill="white"/>
      <rect x="130" y="12" width="34" height="34" rx="4" fill="url(#gradMain)"/>

      <rect x="0" y="118" width="58" height="58" rx="8" fill="white"/>
      <rect x="12" y="130" width="34" height="34" rx="4" fill="url(#gradMain)"/>

      <!-- data modules -->
      <rect x="74" y="14" width="18" height="18" rx="3" fill="white"/>
      <rect x="74" y="40" width="18" height="18" rx="3" fill="white"/>
      <rect x="100" y="40" width="18" height="18" rx="3" fill="white"/>
      <rect x="74" y="66" width="18" height="18" rx="3" fill="white"/>
      <rect x="100" y="66" width="18" height="18" rx="3" fill="white"/>
      <rect x="126" y="66" width="18" height="18" rx="3" fill="white"/>

      <rect x="74" y="100" width="18" height="18" rx="3" fill="white"/>
      <rect x="100" y="100" width="18" height="18" rx="3" fill="white"/>
      <rect x="126" y="100" width="18" height="18" rx="3" fill="white"/>
      <rect x="152" y="100" width="18" height="18" rx="3" fill="white"/>

      <rect x="74" y="126" width="18" height="18" rx="3" fill="white"/>
      <rect x="126" y="126" width="18" height="18" rx="3" fill="white"/>
      <rect x="152" y="126" width="18" height="18" rx="3" fill="white"/>

      <rect x="74" y="152" width="18" height="18" rx="3" fill="white"/>
      <rect x="100" y="152" width="18" height="18" rx="3" fill="white"/>
      <rect x="152" y="152" width="18" height="18" rx="3" fill="white"/>
    </g>
  </g>

  <!-- Wordmark -->
    <!-- cleaner wordmark actual text via system font -->
  <text x="512" y="952" text-anchor="middle" font-family="Inter, Poppins, Montserrat, Arial, sans-serif" font-size="126" font-weight="700" letter-spacing="4" fill="url(#gradText)">YUSIOP</text>
</svg>